name: Miri

on:
  pull_request:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Dotenv, `fs::read_to_string`, tempfile tests, etc. need host cwd/FS; Miri isolation blocks these.
  MIRIFLAGS: -Zmiri-disable-isolation

jobs:
  miri:
    name: Miri (summer --lib)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # Workspace includes examples/integrations/plugin-example with path = "contrib-plugins/...".
      - name: Checkout contrib-plugins
        uses: actions/checkout@v4
        with:
          repository: summer-rs/contrib-plugins
          path: contrib-plugins

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Miri setup
        run: cargo miri setup

      - name: Run Miri tests
        run: cargo miri test -p summer --lib
