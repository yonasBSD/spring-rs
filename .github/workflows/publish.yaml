name: Publish

on:
  workflow_dispatch:
    inputs:
      msg:
        required: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout contrib-plugins
        uses: actions/checkout@v4
        with:
          repository: summer-rs/contrib-plugins
          path: contrib-plugins

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install dependency
        run: cargo install cargo-workspaces
      - name: Build
        run: cargo build --workspace --verbose
      - name: Run tests
        run: cargo test --workspace --verbose
      - name: Run Publish
        run: |
          sed -i 's/"examples.*,//' Cargo.toml &&
          cp README.md ./summer/ &&
          sed -i 's|include_str!("../../README.md")|include_str!("../README.md")|' summer/src/lib.rs
          cargo ws publish --publish-as-is --token=${{secrets.CARGO_TOKEN}} --allow-dirty
