name: Clippy Lint

on: [pull_request]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # plugin-example and others use path = "contrib-plugins/..." — must exist for workspace resolution.
      - name: Checkout contrib-plugins
        uses: actions/checkout@v4
        with:
          repository: summer-rs/contrib-plugins
          path: contrib-plugins

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust stable with Clippy
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Checkout contrib-plugins
        uses: actions/checkout@v4
        with:
          repository: summer-rs/contrib-plugins
          path: contrib-plugins

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Run Test
        run: cargo test --workspace --verbose